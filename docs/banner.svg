  <!-- Main title -->
  <text x="450" y="88" text-anchor="middle" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.28)">{</text>
  <text x="450" y="88" text-anchor="middle" font-family="'Courier New', monospace" font-size="44" font-weight="900" fill="white" dx="-4">pyobfuscator</text>
  <text x="450" y="88" text-anchor="middle" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="rgba(255,255,255,0.28)" dx="228">}</text>

  <!-- Subtitle -->
  <text x="450" y="116" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.35)" letter-spacing="4">PYTHON CODE OBFUSCATION ENGINE</text>

  <!-- Live badge -->
  <rect x="330" y="138" width="240" height="32" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <circle cx="354" cy="154" r="4" fill="#4ade80"/>
  <text x="366" y="158" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.65)">Try it Live  →  web app</text>
